<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>OKC Flight Deals</title>

<style>
body{
background:#09090d;
color:#e5e5e5;
font-family:Arial,sans-serif;
margin:0;
}

.header{
padding:20px;
border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
font-size:34px;
font-weight:bold;
color:#b87828;
}

.sub{
color:#999;
margin-top:4px;
}

.btn{
background:#b87828;
border:none;
color:white;
padding:12px 18px;
border-radius:8px;
font-weight:bold;
margin-top:16px;
cursor:pointer;
}

.filters{
padding:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.filter{
padding:10px 15px;
border:1px solid #b87828;
border-radius:999px;
cursor:pointer;
}

.grid{
padding:16px;
display:grid;
gap:15px;
}

.card{
background:#111118;
border:1px solid rgba(255,255,255,.08);
border-radius:12px;
padding:18px;
}

.price{
font-size:42px;
font-weight:bold;
color:#b87828;
margin:10px 0;
}

.actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:14px;
}

.verify{
background:#b87828;
color:white;
padding:10px 14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.alert{
background:#222;
border:none;
color:white;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
}

.msg{
text-align:center;
padding:50px;
color:#aaa;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">✈ OKC Flight Deals</div>
<div class="sub">Powered by Duffel + Render</div>

<button class="btn" onclick="loadDeals()">
Refresh Deals
</button>
</div>

<div class="filters">
<div class="filter" onclick="setFilter('all')">
ALL
</div>

<div class="filter" onclick="setFilter('nonstop')">
NONSTOP
</div>

<div class="filter" onclick="setFilter('cheap')">
UNDER $250
</div>
</div>

<div id="grid" class="grid">
<div class="msg">Loading deals...</div>
</div>

<script>

const API =
"https://okc-flights-backend.onrender.com/api/deals";

let allDeals = [];
let currentFilter = "all";

function setFilter(filter){
currentFilter = filter;
renderDeals();
}

function createAlert(destination,price){

const alerts =
JSON.parse(
localStorage.getItem("okcAlerts") || "[]"
);

alerts.push({
destination,
price
});

localStorage.setItem(
"okcAlerts",
JSON.stringify(alerts)
);

alert(
`Alert saved for ${destination} under $${price}`
);
}

function renderDeals(){

let deals = [...allDeals];

if(currentFilter==="nonstop"){
deals = deals.filter(d=>d.nonstop);
}

if(currentFilter==="cheap"){
deals = deals.filter(d=>d.price<250);
}

const grid =
document.getElementById("grid");

if(!deals.length){
grid.innerHTML =
'<div class="msg">No deals found.</div>';
return;
}

grid.innerHTML = deals.map(d=>`

<div class="card">

<div>
OKC → ${d.destination}
</div>

<div class="price">
$${d.price}
</div>

<div>
${d.airline}
</div>

<div style="margin-top:10px">

${d.nonstop ? "✓ Nonstop" : "1+ Stops"}

<br>

Depart:
${d.departureDate}

<br>

Return:
${d.returnDate}

</div>

<div class="actions">

<a
class="verify"
href="${d.verifyUrl}"
target="_blank"
>
Verify Fare
</a>

<button
class="alert"
onclick="createAlert('${d.destination}',${d.price})"
>
Alert Me
</button>

</div>

</div>

`).join("");
}

async function loadDeals(){

const grid =
document.getElementById("grid");

grid.innerHTML =
'<div class="msg">Loading airfare deals...</div>';

try{

const res =
await fetch(API);

allDeals =
await res.json();

renderDeals();

}catch(err){

grid.innerHTML =
`<div class="msg">${err}</div>`;

}
}

loadDeals();

</script>

</body>
</html>
