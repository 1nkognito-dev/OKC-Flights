
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKC Flight Deals</title>
<style>
:root{--gold:#b87828;--bg:#0a0a0f;--text:#e8e0d0;--border:rgba(255,255,255,.08)}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}
.header{padding:20px;border-bottom:1px solid var(--border)}
.logo{font-size:28px;color:var(--gold);font-weight:bold}
.sub{color:#888;margin-top:6px}
.refresh-btn{margin-top:16px;background:var(--gold);color:#000;border:none;padding:12px 16px;border-radius:5px;cursor:pointer;font-weight:bold}
.filters{display:flex;gap:10px;padding:14px 16px}
.filter-btn{background:transparent;border:1px solid rgba(184,120,40,.4);color:var(--gold);padding:8px 14px;border-radius:20px;cursor:pointer}
.filter-btn.active{background:var(--gold);color:#000}
.deals-grid{padding:16px;display:grid;gap:14px}
.deal-card{border:1px solid var(--border);border-radius:10px;padding:18px;background:rgba(255,255,255,.03)}
.price{font-size:40px;color:var(--gold);font-weight:bold}
.loading{text-align:center;padding:60px 20px;color:#888}
.error{color:#ff7777}
</style>
</head>
<body>

<div class="header">
  <div class="logo">✈ OKC Flight Deals</div>
  <div class="sub">Live airfare powered by Duffel API</div>
  <button class="refresh-btn" onclick="loadDeals()">Refresh Deals</button>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all', this)">ALL</button>
  <button class="filter-btn" onclick="setFilter('nonstop', this)">NONSTOP</button>
  <button class="filter-btn" onclick="setFilter('cheap', this)">UNDER $250</button>
</div>

<div id="dealsGrid" class="deals-grid"></div>

<script>
const API_BASE = "https://okc-flights-backend.onrender.com";
let allDeals = [];
let currentFilter = "all";

async function loadDeals() {
  const grid = document.getElementById("dealsGrid");
  grid.innerHTML = '<div class="loading">Loading live airfare deals...</div>';

  try {
    const response = await fetch(`${API_BASE}/api/deals`);

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    allDeals = await response.json();
    renderDeals();
  } catch (err) {
    console.error(err);
    grid.innerHTML = '<div class="loading error">Failed to load deals from backend.</div>';
  }
}

function renderDeals() {
  let deals = [...allDeals];

  if (currentFilter === "nonstop") deals = deals.filter(d => d.nonstop);
  if (currentFilter === "cheap") deals = deals.filter(d => d.price < 250);

  const grid = document.getElementById("dealsGrid");

  if (!deals.length) {
    grid.innerHTML = '<div class="loading">No deals found.</div>';
    return;
  }

  grid.innerHTML = deals.map(deal => `
    <div class="deal-card">
      <div>OKC → ${deal.destination}</div>
      <div class="price">$${deal.price}</div>
      <div>${deal.airline}</div>
      <div>
        ${deal.nonstop ? "✓ Nonstop Flight" : "1+ Stops"}<br>
        Depart: ${deal.departureDate}<br>
        Return: ${deal.returnDate}
      </div>
    </div>
  `).join("");
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderDeals();
}

loadDeals();
</script>

</body>
</html>
