<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OKC Flight Deals</title>
<style>
body{margin:0;background:#0a0a0f;color:#e8e0d0;font-family:Arial,sans-serif}
.header{padding:20px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo{font-size:28px;color:#b87828;font-weight:bold}
.sub{color:#999}
.btn{margin-top:15px;padding:12px 16px;background:#b87828;border:none;border-radius:6px;font-weight:bold}
.grid{padding:16px;display:grid;gap:14px}
.card{border:1px solid rgba(255,255,255,.08);padding:16px;border-radius:10px}
.price{font-size:38px;color:#b87828;font-weight:bold}
.msg{text-align:center;padding:40px;color:#aaa}
.err{color:#ff7b7b;white-space:pre-wrap}
</style>
</head>
<body>
<div class="header">
<div class="logo">✈ OKC Flight Deals</div>
<div class="sub">Powered by Render + Duffel</div>
<button class="btn" onclick="loadDeals()">Refresh Deals</button>
</div>

<div id="grid" class="grid">
<div class="msg">Loading deals...</div>
</div>

<script>
const API="https://okc-flights-backend.onrender.com/api/deals";

async function loadDeals(){
 const grid=document.getElementById('grid');
 grid.innerHTML='<div class="msg">Loading live airfare deals...</div>';

 try{
   const res=await fetch(API);
   const text=await res.text();

   let deals=[];
   try{
      deals=JSON.parse(text);
   }catch(e){
      grid.innerHTML=`<div class="msg err">Backend did not return JSON:\n${text}</div>`;
      return;
   }

   if(!Array.isArray(deals)){
      grid.innerHTML=`<div class="msg err">Unexpected response:\n${JSON.stringify(deals,null,2)}</div>`;
      return;
   }

   if(deals.length===0){
      grid.innerHTML=`<div class="msg err">
No deals returned by backend.

Your frontend is working.
Your backend is responding.
The issue is inside server.js / Duffel API processing.

Open:
https://okc-flights-backend.onrender.com/api/deals
and check Render logs.
      </div>`;
      return;
   }

   grid.innerHTML=deals.map(d=>`
      <div class="card">
        <div>OKC → ${d.destination}</div>
        <div class="price">$${d.price}</div>
        <div>${d.airline||''}</div>
        <div>${d.nonstop?'✓ Nonstop':'1+ Stops'}<br>
        Depart: ${d.departureDate}<br>
        Return: ${d.returnDate}</div>
      </div>
   `).join('');
 }catch(err){
   grid.innerHTML=`<div class="msg err">${err}</div>`;
 }
}
loadDeals();
</script>
</body>
</html>
