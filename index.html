<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OKC Flight Deals</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #09090d;
      color: #e5e5e5;
      font-family: Arial, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      padding: 18px 20px 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      border-bottom: 1px solid #1e1e2a;
    }
    .logo {
      font-size: 28px;
      color: #b87828;
      font-weight: bold;
      flex: 1;
      min-width: 200px;
    }
    .refresh-btn {
      background: #b87828;
      color: #fff;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: #d49030; }
    .refresh-btn:disabled { background: #555; cursor: default; }

    /* ── Search window banner ── */
    .dates-banner {
      background: #13131c;
      padding: 10px 20px;
      font-size: 13px;
      color: #aaa;
      border-bottom: 1px solid #1e1e2a;
    }
    .dates-banner span { color: #b87828; font-weight: bold; }

    /* ── Filters ── */
    .filters {
      padding: 14px 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid #1e1e2a;
    }
    .filter-btn {
      background: #1e1e2a;
      color: #ccc;
      border: 1px solid #2e2e3e;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      transition: background 0.15s, color 0.15s;
    }
    .filter-btn:hover { background: #2a2a3a; }
    .filter-btn.active {
      background: #b87828;
      color: #fff;
      border-color: #b87828;
    }

    /* ── Status bar ── */
    .status {
      padding: 10px 20px;
      font-size: 13px;
      color: #888;
      min-height: 34px;
    }

    /* ── Grid ── */
    .grid {
      padding: 16px 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    /* ── Cards ── */
    .card {
      background: #111118;
      padding: 18px;
      border-radius: 12px;
      border: 1px solid #1e1e2a;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #3a3a4a; }

    /* Cheapest badge */
    .card.cheapest {
      border-color: #b87828;
      box-shadow: 0 0 0 1px #b87828 inset;
    }
    .cheapest-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #b87828;
      color: #fff;
      font-size: 10px;
      font-weight: bold;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .route {
      font-size: 16px;
      font-weight: bold;
      color: #e5e5e5;
    }
    .price {
      font-size: 42px;
      color: #b87828;
      font-weight: bold;
      line-height: 1;
      margin: 4px 0;
    }
    .airline {
      font-size: 13px;
      color: #aaa;
    }
    .stops-tag {
      display: inline-block;
      font-size: 12px;
      font-weight: bold;
      padding: 3px 10px;
      border-radius: 20px;
      width: fit-content;
      margin-top: 2px;
    }
    .stops-tag.nonstop { background: #1a3a1a; color: #5fcc5f; border: 1px solid #2a5a2a; }
    .stops-tag.one-stop { background: #2a2a10; color: #cccc40; border: 1px solid #4a4a20; }
    .stops-tag.multi-stop { background: #2a1a1a; color: #cc6060; border: 1px solid #4a2a2a; }

    .travel-dates {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .verify-link, .alert-btn {
      flex: 1;
      min-width: 110px;
      text-align: center;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: background 0.15s;
    }
    .verify-link {
      background: #b87828;
      color: #fff;
    }
    .verify-link:hover { background: #d49030; }
    .alert-btn {
      background: #1e1e2a;
      color: #ccc;
      border: 1px solid #2e2e3e;
    }
    .alert-btn:hover { background: #2a2a3a; }
    .alert-btn.alerted {
      background: #1a3a1a;
      color: #5fcc5f;
      border-color: #2a5a2a;
    }

    /* ── Loading / empty states ── */
    .state-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: #666;
      font-size: 16px;
    }
    .spinner {
      display: inline-block;
      width: 32px; height: 32px;
      border: 3px solid #2e2e3e;
      border-top-color: #b87828;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .logo { font-size: 22px; }
      .grid { padding: 12px; gap: 10px; }
      .card { padding: 14px; }
      .price { font-size: 36px; }
      .filters { padding: 10px 12px; gap: 6px; }
      .filter-btn { padding: 7px 12px; font-size: 12px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">✈ OKC Flight Deals</div>
  <button class="refresh-btn" id="refreshBtn" onclick="loadDeals()">Refresh</button>
</div>

<div class="dates-banner" id="datesBanner">Loading search dates…</div>

<div class="filters">
  <button class="filter-btn active" id="btn-all"      onclick="setFilter('all')">All</button>
  <button class="filter-btn"        id="btn-nonstop"  onclick="setFilter('nonstop')">Nonstop</button>
  <button class="filter-btn"        id="btn-1stop"    onclick="setFilter('1stop')">Max 1 Stop</button>
  <button class="filter-btn"        id="btn-cheap"    onclick="setFilter('cheap')">Under $250</button>
</div>

<div class="status" id="status"></div>
<div class="grid"  id="grid"><div class="state-msg"><div class="spinner"></div><br>Loading deals…</div></div>

<script>
  const API = 'https://okc-flights-backend.onrender.com/api/deals';

  let allDeals = [];
  let filter   = 'all';
  let alerts   = JSON.parse(localStorage.getItem('okc-alerts') || '{}');

  // ── Helpers ──────────────────────────────────────────────
  function fmtDate(iso) {
    if (!iso) return '?';
    const [y, m, d] = iso.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[+m - 1]} ${+d}`;
  }

  function stopsLabel(stops) {
    if (stops === 0) return { cls: 'nonstop',    text: 'Nonstop' };
    if (stops === 1) return { cls: 'one-stop',   text: '1 Stop'  };
    return               { cls: 'multi-stop',  text: `${stops} Stops` };
  }

  function saveAlerts() {
    localStorage.setItem('okc-alerts', JSON.stringify(alerts));
  }

  // ── Filter ───────────────────────────────────────────────
  function setFilter(f) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + f)?.classList.add('active');
    render();
  }

  // ── Render ───────────────────────────────────────────────
  function render() {
    let deals = [...allDeals];

    if (filter === 'nonstop') deals = deals.filter(d => d.stops === 0);
    if (filter === '1stop')   deals = deals.filter(d => d.stops <= 1);
    if (filter === 'cheap')   deals = deals.filter(d => d.price < 250);

    const grid   = document.getElementById('grid');
    const status = document.getElementById('status');

    if (!deals.length) {
      grid.innerHTML   = '<div class="state-msg">No deals match this filter.</div>';
      status.textContent = '';
      return;
    }

    const minPrice = deals[0].price; // already sorted cheapest first

    status.textContent = `Showing ${deals.length} deal${deals.length !== 1 ? 's' : ''}`;

    grid.innerHTML = deals.map((d, i) => {
      const isCheapest = d.price === minPrice;
      const { cls, text } = stopsLabel(d.stops ?? (d.nonstop ? 0 : 1));
      const alertKey = d.destination + '_' + d.departureDate;
      const isAlerted = !!alerts[alertKey];

      return `
        <div class="card ${isCheapest ? 'cheapest' : ''}">
          ${isCheapest ? '<div class="cheapest-badge">⭐ CHEAPEST</div>' : ''}
          <div class="route">OKC → ${d.destination}</div>
          <div class="price">$${d.price.toLocaleString()}</div>
          <div class="airline">${d.airline}</div>
          <div class="stops-tag ${cls}">${text}</div>
          <div class="travel-dates">
            ✈ Depart ${fmtDate(d.departureDate)} &nbsp;·&nbsp; Return ${fmtDate(d.returnDate)}
          </div>
          <div class="card-actions">
            <a class="verify-link" href="${d.verifyUrl}" target="_blank" rel="noopener">
              Check on Google Flights
            </a>
            <button class="alert-btn ${isAlerted ? 'alerted' : ''}"
                    id="alert-${d.destination}-${i}"
                    onclick="toggleAlert(event,'${d.destination}','${d.departureDate}',${i})">
              ${isAlerted ? '🔔 Alerted' : '🔕 Alert Me'}
            </button>
          </div>
        </div>`;
    }).join('');
  }

  // ── Alert toggle (preserved across refreshes) ─────────────
  function toggleAlert(e, dest, depDate, idx) {
    const key = dest + '_' + depDate;
    alerts[key] = !alerts[key];
    saveAlerts();

    const btn = e.currentTarget;
    btn.textContent  = alerts[key] ? '🔔 Alerted' : '🔕 Alert Me';
    btn.classList.toggle('alerted', alerts[key]);

    if (alerts[key]) {
      const orig = btn.textContent;
      btn.textContent = '✓ Saved!';
      setTimeout(() => { btn.textContent = orig; }, 1200);
    }
  }

  // ── Load ─────────────────────────────────────────────────
  async function loadDeals() {
    const refreshBtn = document.getElementById('refreshBtn');
    const grid       = document.getElementById('grid');
    const status     = document.getElementById('status');
    const banner     = document.getElementById('datesBanner');

    refreshBtn.disabled    = true;
    refreshBtn.textContent = 'Loading…';
    status.textContent     = '';
    grid.innerHTML         = '<div class="state-msg"><div class="spinner"></div><br>Searching flights…</div>';

    try {
      const r = await fetch(API);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      allDeals = await r.json();

      // Show search window from first deal
      if (allDeals.length) {
        const dep = fmtDate(allDeals[0].departureDate);
        const ret = fmtDate(allDeals[0].returnDate);
        banner.innerHTML =
          `Search window: <span>Depart ${dep}</span> &nbsp;·&nbsp; <span>Return ${ret}</span>` +
          ` &nbsp;·&nbsp; roundtrip economy from OKC · 1 adult`;
      } else {
        banner.textContent = 'No deals found.';
      }

      render();
    } catch (err) {
      grid.innerHTML = `<div class="state-msg">⚠️ Failed to load deals.<br><small>${err.message}</small></div>`;
      banner.textContent = '';
    } finally {
      refreshBtn.disabled    = false;
      refreshBtn.textContent = 'Refresh';
    }
  }

  loadDeals();
</script>
</body>
</html>
